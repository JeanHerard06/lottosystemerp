<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nouvelle Fiche</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100"><header class="bg-black text-white p-4"><b>Nouvelle Fiche</b></header><main class="p-4"><div id="plays"><div class="grid grid-cols-3 gap-2 mb-2"><input name="number" placeholder="Numéro" class="border p-3 rounded"><select name="type" class="border p-3 rounded"><option value="borlette">Borlette</option><option value="mariage">Mariage</option><option value="lotto3">Lotto 3</option><option value="lotto4">Lotto 4</option></select><input name="amount" type="number" step="0.01" placeholder="Montant" class="border p-3 rounded"></div></div><button onclick="addLine()" class="bg-yellow-500 text-white px-4 py-2 rounded mb-3">+ Ligne</button><button onclick="saveFiche()" class="w-full bg-black text-white p-3 rounded">Enregistrer</button></main><script src="app.js"></script></body></html>
