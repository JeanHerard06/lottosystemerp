name: PHP CI

on:
  push:
    branches: [ main, develop, 'release/**', 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop, 'release/**' ]

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, fileinfo

      - name: Check PHP syntax
        run: |
          find . -type f -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./mobile_app/*" \
            -print0 | xargs -0 -n1 php -l

      - name: Basic project sanity
        run: |
          test -f install.php
          test -f upgrade.php
          test -d app
          test -d views
          test -d actions
          test -d database
