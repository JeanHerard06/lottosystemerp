name: Deployment Checks

on:
  pull_request:
  push:
    branches: [ main, develop, "release/**" ]

jobs:
  deployment-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, openssl, json, fileinfo
      - name: PHP syntax check scripts
        run: |
          find scripts -name "*.php" -print0 | xargs -0 -n1 php -l
      - name: Health check syntax
        run: php -l scripts/health_check.php
