name: RC1 Smoke Tests

on:
  pull_request:
  push:
    branches: [ develop, release/v1.0-rc1 ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax check
        run: |
          find . -type f -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./storage/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 -n1 php -l
      - name: Smoke test
        run: php scripts/smoke_test.php
